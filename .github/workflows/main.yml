name: MyOS x64 Ultimate Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build x64 Kernel & GPT ISO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Toolchain
        run: |
          sudo apt update
          sudo apt install -y build-essential nasm xorriso mtools clang lld grub-common grub-pc-bin

      - name: Build Kernels
        run: make all

      - name: Construct GPT Deployment Image
        run: |
          mkdir -p iso/boot/grub
          cp build/installer.bin iso/boot/grub/
          cp build/target.bin iso/boot/grub/
          
          # Rufus & Windows Metadata
          echo "[AutoRun]" > iso/autorun.inf
          echo "label=MyOS x64 Ultimate Edition" >> iso/autorun.inf
          echo "MyOS x64 Ultimate v1.0" > iso/version.txt
          
          cat <<EOF > iso/boot/grub/grub.cfg
          set timeout=2
          set default=0
          
          menuentry "MyOS x64 Ultimate (USB Boot Supported)" {
              multiboot /boot/installer.bin
              module /boot/target.bin "target_kernel"
              boot
          }
          EOF
          
          # Create Hybrid ISO (Bootable from USB and CD)
          # -volid is what Rufus shows as the 'Name'
          grub-mkrescue -o MyOS-Ultimate-x64.iso iso -- -volid "MYOS_X64" -publisher "MyOS Development Team"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MyOS-x64-Distribution
          path: MyOS-Ultimate-x64.iso
