name: SimpleOS x64 Ultimate Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build x64 Kernel & GPT ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Toolchain
        run: |
          sudo apt update
          sudo apt install -y build-essential nasm xorriso mtools clang lld grub-common grub-pc-bin

      - name: Build Kernels
        run: make all

      - name: Construct GPT Deployment Image
        run: |
          mkdir -p iso/boot/grub
          cp build/installer.bin iso/boot/grub/
          cp build/target.bin iso/boot/grub/
          
          # Rufus & Windows Metadata
          echo "[AutoRun]" > iso/autorun.inf
          echo "label=SimpleOS x64 Ultimate Edition" >> iso/autorun.inf
          echo "SimpleOS x64 Ultimate v1.0" > iso/version.txt
          
          cat <<EOF > iso/boot/grub/grub.cfg
          set timeout=2
          set default=0
          
          menuentry "SimpleOS x64 Ultimate (USB Boot Supported)" {
              multiboot /boot/installer.bin
              module /boot/target.bin "target_kernel"
              boot
          }
          EOF
          
          # Create Hybrid ISO
          grub-mkrescue -o SimpleOS-x64.iso iso -- -volid "SIMPLEOS_X64" -publisher "SimpleOS Development Team"

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          files: SimpleOS-x64.iso
          tag_name: latest
          name: "SimpleOS x64 Ultimate - Latest Build"
          body: |
            Automated production build of **SimpleOS x64**.
            
            **Included Assets:**
            - `SimpleOS-x64.iso`: Hybrid boot image (BIOS/UEFI/USB).
            
            **Changes:**
            - Professional NT-style I/O Manager (IRPs).
            - Updated Driver Signature System.
            - Hybrid Syscall Support (Linux/NT).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SimpleOS-x64-Distribution
          path: SimpleOS-x64.iso
